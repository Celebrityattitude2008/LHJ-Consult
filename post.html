<!DOCTYPE html>
<html lang="en" x-data="{ darkMode: false, mobileMenu: false }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | LHJ Consult</title>
    <meta name="description" content="Read the full wellness insight from LHJ Consult.">
    <meta name="keywords" content="wellness blog, nutrition tips, faith-based health, LHJ Consult">
    <meta name="author" content="LHJ Consult">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, get, child } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCYy-W4skFlrjKEx3ylwsp7ZmkIewtBPTc",
            authDomain: "lhz-consult.firebaseapp.com",
            projectId: "lhz-consult",
            storageBucket: "lhz-consult.firebasestorage.app",
            messagingSenderId: "920864160501",
            appId: "1:920864160501:web:398c02e121aeae47fca3bc",
            measurementId: "G-078KJE43DS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');

            if (!postId) {
                document.getElementById('post-content').innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400">Post not found.</p>';
                return;
            }

            const postRef = ref(db, 'blogs/' + postId);
            get(child(ref(db), 'blogs/' + postId)).then((snapshot) => {
                if (snapshot.exists()) {
                    const post = snapshot.val();
                    const timestamp = new Date(post.timestamp || Date.now());
                    const imageHtml = post.imageBase64 ? `<img src="${post.imageBase64}" alt="Blog image" class="w-full h-64 md:h-80 object-cover rounded-2xl mb-8" />` : '';

                    document.getElementById('post-content').innerHTML = `
                        ${imageHtml}
                        <div class="mb-4">
                            <span class="text-primary font-bold text-sm uppercase tracking-widest">Wellness Insight</span>
                            <h1 class="text-3xl md:text-4xl font-bold mt-2">${post.title}</h1>
                            <p class="text-gray-500 text-sm mt-2">Posted on ${timestamp.toLocaleString()}</p>
                        </div>
                        <hr class="border-gray-100 dark:border-zinc-800 my-6">
                        <div class="text-gray-700 dark:text-gray-300 leading-relaxed text-lg prose-text">${post.content}</div>
                    `;
                } else {
                    document.getElementById('post-content').innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400">Post not found.</p>';
                }
            }).catch((error) => {
                console.error('Error loading post:', error);
                document.getElementById('post-content').innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400">Unable to load post.</p>';
            });
        }

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2D5A27',
                        secondary: '#F4F9F4',
                        accent: '#1B261B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .transition-all { transition: all 0.3s ease; }
        .prose-text { white-space: pre-wrap; }
    </style>
</head>
<body class="font-sans antialiased text-accent dark:text-gray-100 bg-white dark:bg-zinc-950 transition-colors duration-300">

    <header class="w-full bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md border-b border-gray-100 dark:border-zinc-800 fixed z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="logo.png" alt="LHJ Consult Logo" class="w-10 h-10 rounded-lg border border-primary" loading="lazy" />
                    <span class="font-bold text-2xl tracking-tight text-accent dark:text-white">LHJ Consult</span>
                </a>
            </div>
            <nav class="hidden md:flex flex-1 justify-center items-center gap-8 font-medium">
                <a href="index.html#about" class="hover:text-primary transition-colors">About</a>
                <a href="index.html#services" class="hover:text-primary transition-colors">Services</a>
                <a href="index.html#testimonials" class="hover:text-primary transition-colors">Testimonials</a>
                <a href="blog.html" class="hover:text-primary transition-colors">Blog</a>
                <a href="index.html#contact" class="hover:text-primary transition-colors">Contact</a>
            </nav>
            <div class="flex items-center gap-2">
                <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800">
                    <template x-if="!darkMode">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </template>
                    <template x-if="darkMode">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </template>
                </button>
                <a href="index.html#contact" class="bg-primary text-white px-6 py-2.5 rounded-full font-bold shadow-lg hover:bg-opacity-90 transition-all">Book Consultation</a>
                <button @click="mobileMenu = !mobileMenu" class="md:hidden p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto">
            <div id="post-content" class="bg-white dark:bg-zinc-900 p-6 md:p-10 rounded-3xl shadow-xl">
                <!-- Post content will be loaded here -->
            </div>
            <div class="mt-8 text-center">
                <a href="blog.html" class="text-primary font-semibold hover:underline">← Back to Blog</a>
            </div>
        </div>
    </main>

    <footer class="py-12 px-6 bg-accent dark:bg-zinc-900 text-white">
        <div class="max-w-7xl mx-auto text-center">
            <div class="flex items-center justify-center gap-3 mb-6">
                <img src="logo.png" alt="LHJ Consult Logo" class="w-10 h-10 rounded-lg border border-white/20" />
                <span class="font-bold text-2xl">LHJ Consult</span>
            </div>
            <p class="text-gray-400 mb-6">Faith-Based Wellness Consultancy</p>
            <div class="flex justify-center gap-8 text-sm">
                <a href="index.html#about" class="hover:text-primary transition-colors">About</a>
                <a href="index.html#services" class="hover:text-primary transition-colors">Services</a>
                <a href="blog.html" class="hover:text-primary transition-colors">Blog</a>
                <a href="index.html#contact" class="hover:text-primary transition-colors">Contact</a>
            </div>
            <div class="mt-8 pt-8 border-t border-white/10 text-xs text-gray-500">
                © 2026 LHJ Consult. All rights reserved.
            </div>
        </div>
    </footer>

</body>
</html>
